name: "\U0001F41B Bug Report"
description: "Submit a bug report to help us improve Traccia."
title: "[Bug]: "
labels: ["unconfirmed bug"]
body:
  - type: markdown
    attributes:
      value: >
        Thank you for taking the time to file a bug report.

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: Traccia SDK Version
      placeholder: "0.1.0"

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12.3"

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Please provide a [code sample](https://stackoverflow.com/help/minimal-reproducible-example) that reproduces the problem you ran into. It can be a Colab link or just a code snippet.
        If you have code snippets, error messages, stack traces please provide them here as well.
        Important! Use code tags to correctly format your code. See https://help.github.com/en/github/writing-on-github/creating-and-highlighting-code-blocks#syntax-highlighting
   
      placeholder: |
        Steps to reproduce the behavior:

        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      render: shell
      description: Paste any error messages or stack traces here.
      
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: "A clear and concise description of what you would expect to happen."

  - type: textarea
    id: additional-information
    attributes:
      label: Additional information
      description: Add any other information related to the bug here, including screenshots if applicable.
  
  - type: dropdown
    id: contribute
    attributes:
      label: Are you interested in contributing a fix for this bug?
      description: If this is a confirmed bug, the maintainers are happy to provide guidance and review.
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I am using the latest version of Traccia.
          required: true
        - label: I have provided a minimal reproducible example.
          required: true
    validations:
      required: true
